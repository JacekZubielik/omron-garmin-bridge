---
name: Label Size

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  label-size:
    name: Label Size
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Size label
        uses: pascalgn/size-label-action@v0.5.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {
            "0": "S",
            "50": "M",
            "200": "L",
            "800": "XL"
            }
